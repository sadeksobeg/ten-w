name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenegta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tenegta_test?schema=public
      AUTH_SECRET: ci-test-auth-secret-minimum-32-chars
      AUTH_URL: http://localhost:3000
      GROWTH_ADMIN_PASSWORD: ChangeMeAdmin!123
      GROWTH_DEMO_PASSWORD: ChangeMePartner!123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
        env:
          CI: true

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: site
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenegta_test
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tenegta_test?schema=public
      AUTH_SECRET: ci-test-auth-secret-minimum-32-chars
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx prisma db push
      - run: npm run build
      - run: npx --yes @lhci/cli@0.14.0 autorun
        working-directory: site
        continue-on-error: true
