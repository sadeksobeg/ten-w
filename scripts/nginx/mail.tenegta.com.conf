# Mailcow reverse proxy (Mailcow listens on 127.0.0.1:8443 after server-mailcow-reverse-proxy.sh)
# Apply: sudo bash scripts/server-nginx-mail.sh

map $http_host $mailcow_forwarded_host {
    default $http_host;
    "~^(.*)\.mail\.tenegta\.com$" $1.tenegta.com;
    "~^mail\.tenegta\.com$" mail.tenegta.com;
}

server {
    listen 80;
    listen [::]:80;
    server_name mail.tenegta.com autodiscover.tenegta.com autoconfig.tenegta.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.tenegta.com autodiscover.tenegta.com autoconfig.tenegta.com;

    ssl_certificate /etc/letsencrypt/live/mail.tenegta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.tenegta.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $mailcow_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
