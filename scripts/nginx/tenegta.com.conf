# T.E.N.E.G.T.A — Nginx reverse proxy for Next.js (PM2 on 127.0.0.1:3100)
# Apply on VPS: bash scripts/server-nginx-tenegta.sh

upstream tenegta_next {
    server 127.0.0.1:3100;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name tenegta.com www.tenegta.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tenegta.com www.tenegta.com;

    ssl_certificate /etc/letsencrypt/live/tenegta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tenegta.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /_next/static/ {
        proxy_pass http://tenegta_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://tenegta_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
    }

    location / {
        proxy_pass http://tenegta_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
    }
}
