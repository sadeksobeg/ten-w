# Monorepo: Netlify build runs from repository root (see root package.json workspaces).
[build]
  command = "npm run check:env -w tenegta-website && npm run build"
  publish = "site/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Note: /api/* is same-origin for the contact form. Cross-origin clients are not supported
# by default. Do not add a SPA /* → /index.html fallback — it breaks Next.js App Router on Netlify.
