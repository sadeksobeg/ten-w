# Git monorepo: build runs from repo root (`npm run build` → workspace), output is site/.next
# If you deploy ONLY the contents of site/ as the repo root (manual zip), use publish = ".next"
# and command = "npm run build" — see netlify-deploy-bundle/netlify.toml
[build]
  command = "npm run build"
  publish = "site/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
